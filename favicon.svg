<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="128" height="128" fill="#0D1117"/>
    
    <!-- Blue circuit lines forming a stylized "B" -->
    <g stroke="#2563EB" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Main vertical line -->
        <line x1="32" y1="24" x2="32" y2="104"/>
        
        <!-- Top curve -->
        <path d="M 32 24 L 64 24 Q 72 24 72 32 Q 72 40 64 40 L 32 40"/>
        
        <!-- Middle curve -->
        <path d="M 32 64 L 68 64 Q 80 64 80 56 Q 80 48 72 48"/>
        
        <!-- Bottom curve -->
        <path d="M 32 104 L 64 104 Q 80 104 80 88 Q 80 72 64 72 L 32 72"/>
        
        <!-- Accent dots -->
        <circle cx="48" cy="32" r="2"/>
        <circle cx="56" cy="72" r="2"/>
        <circle cx="72" cy="88" r="2"/>
    </g>
    
    <!-- Orange accent pulse -->
    <circle cx="80" cy="64" r="3" fill="#FF6A00" opacity="0.8">
        <animate attributeName="r" from="3" to="12" dur="2s" repeatCount="indefinite" values="3;8;3"/>
        <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite" values="0.8;0;0.8"/>
    </circle>
</svg>
