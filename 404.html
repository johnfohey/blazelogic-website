<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found. Return to BlazeLogic.">
    <title>Page Not Found — BlazeLogic</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .error-content {
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563EB 0%, #FF6A00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            letter-spacing: -0.03em;
        }
        
        .error-title {
            font-size: 2rem;
            color: #E5E7EB;
            margin: 1rem 0;
            font-weight: 600;
        }
        
        .error-description {
            font-size: 1.1rem;
            color: #64748B;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        
        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-description">
                We couldn't find the page you're looking for. It might have moved or doesn't exist.
            </p>
            <div class="error-buttons">
                <a href="/" class="btn btn-primary">Back to Home</a>
                <a href="/#contact" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
    </div>
</body>
</html>
