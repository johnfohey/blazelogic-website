<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <!-- Metallic gradient for B -->
        <linearGradient id="metallicGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#a8a8a8;stop-opacity:1" />
            <stop offset="30%" style="stop-color:#e8e8e8;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#f5f5f5;stop-opacity:1" />
            <stop offset="70%" style="stop-color:#e8e8e8;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a8a8a8;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="bGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#d0d0d0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
        </linearGradient>
        
        <filter id="metalShine">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
        </filter>
        
        <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background (for reference, transparent in use) -->
    <rect width="800" height="200" fill="#0D1117" opacity="1"/>
    
    <!-- B Icon (Metallic) -->
    <g id="bIcon" transform="translate(30, 30)">
        <!-- Metallic B shape -->
        <path d="M 30 20 L 30 120 L 65 120 Q 85 120 85 100 Q 85 85 70 85 L 30 85 M 30 70 L 60 70 Q 80 70 80 55 Q 80 40 60 40 L 30 40" 
              fill="url(#bGradient)" stroke="none" stroke-width="2"/>
        
        <!-- Metallic highlight -->
        <path d="M 35 25 L 35 115 Q 40 118 60 118 Q 78 118 80 100 Q 80 88 72 85 L 35 85 M 35 72 L 58 72 Q 75 72 78 58 Q 78 42 58 42 L 35 42" 
              fill="none" stroke="url(#metallicGradient)" stroke-width="1.5" opacity="0.6"/>
        
        <!-- Circuit traces - right side -->
        <g stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main circuit line -->
            <path d="M 90 35 L 110 35 L 110 50 L 95 50 M 110 50 L 130 50 L 130 70"/>
            
            <!-- Secondary circuit line -->
            <path d="M 90 85 L 115 85 L 115 100 L 90 100 M 115 85 L 135 85 L 135 105"/>
            
            <!-- Bottom circuit -->
            <path d="M 90 115 L 125 115 L 125 105"/>
        </g>
        
        <!-- Circuit nodes (orange accent dots) -->
        <circle cx="110" cy="35" r="2.5" fill="#FF6A00"/>
        <circle cx="110" cy="50" r="2" fill="#FF6A00" opacity="0.8"/>
        <circle cx="130" cy="70" r="2.5" fill="#FF6A00"/>
        <circle cx="115" cy="85" r="2" fill="#FF6A00" opacity="0.8"/>
        <circle cx="135" cy="105" r="2.5" fill="#FF6A00"/>
        <circle cx="125" cy="115" r="2" fill="#FF6A00" opacity="0.8"/>
    </g>
    
    <!-- Wordmark -->
    <g id="wordmark" transform="translate(240, 55)">
        <!-- BLAZE in white -->
        <text x="0" y="55" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="72" font-weight="700" letter-spacing="-2" fill="#E5E7EB">BLAZE</text>
        
        <!-- LOGIC in orange -->
        <text x="385" y="55" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="72" font-weight="700" letter-spacing="-1.5" fill="#FF6A00">LOGIC</text>
    </g>
    
    <!-- Blue pulse line under wordmark -->
    <line x1="240" y1="90" x2="700" y2="90" stroke="#2563EB" stroke-width="2" opacity="0.8"/>
    <ellipse cx="470" cy="90" rx="40" ry="3" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.5"/>
    
    <!-- Glow effect for pulse -->
    <filter id="pulseGlow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    
    <line x1="240" y1="90" x2="700" y2="90" stroke="#2563EB" stroke-width="3" opacity="0.3" filter="url(#pulseGlow)"/>
</svg>