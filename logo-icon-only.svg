<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Metallic gradient for B -->
        <linearGradient id="metallicGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#a8a8a8;stop-opacity:1" />
            <stop offset="30%" style="stop-color:#e8e8e8;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#f5f5f5;stop-opacity:1" />
            <stop offset="70%" style="stop-color:#e8e8e8;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a8a8a8;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="bGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#d0d0d0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
        </linearGradient>
        
        <filter id="metalShine">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="200" height="200" fill="#0D1117"/>
    
    <!-- Metallic B -->
    <g transform="translate(35, 25)">
        <!-- B shape with metallic gradient -->
        <path d="M 30 20 L 30 140 L 80 140 Q 105 140 105 120 Q 105 105 85 100 L 30 100 M 30 80 L 75 80 Q 100 80 100 65 Q 100 45 75 45 L 30 45" 
              fill="url(#bGradient)" stroke="none"/>
        
        <!-- Metallic edge highlight -->
        <path d="M 32 22 L 32 138 Q 35 140 75 140 Q 100 140 103 122 Q 103 108 88 103 L 32 103 M 32 82 L 73 82 Q 98 82 102 67 Q 102 47 73 47 L 32 47" 
              fill="none" stroke="url(#metallicGradient)" stroke-width="1" opacity="0.5" filter="url(#metalShine)"/>
        
        <!-- Circuit traces - precise and engineered -->
        <g stroke="#2563EB" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main vertical circuit line -->
            <path d="M 115 40 L 135 40 L 135 60 L 110 60"/>
            
            <!-- Secondary circuit line -->
            <path d="M 115 100 L 140 100 L 140 120 L 115 120"/>
            
            <!-- Tertiary circuit line -->
            <path d="M 110 140 L 130 140 L 130 125"/>
        </g>
        
        <!-- Circuit nodes (orange accent dots) -->
        <circle cx="135" cy="40" r="3" fill="#FF6A00"/>
        <circle cx="135" cy="60" r="2.5" fill="#FF6A00" opacity="0.9"/>
        <circle cx="140" cy="100" r="3" fill="#FF6A00"/>
        <circle cx="140" cy="120" r="2.5" fill="#FF6A00" opacity="0.9"/>
        <circle cx="130" cy="140" r="2.5" fill="#FF6A00"/>
        <circle cx="130" cy="125" r="2" fill="#FF6A00" opacity="0.8"/>
        
        <!-- Connecting dots -->
        <circle cx="110" cy="60" r="1.5" fill="#2563EB" opacity="0.6"/>
        <circle cx="115" cy="120" r="1.5" fill="#2563EB" opacity="0.6"/>
    </g>
    
    <!-- Optional: Glow effect for premium feel -->
    <defs>
        <filter id="iconGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Subtle glow layer -->
    <circle cx="100" cy="100" r="85" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.1" filter="url(#iconGlow)"/>
</svg>