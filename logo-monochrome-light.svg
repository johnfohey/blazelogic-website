<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="lightMonoShine">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
        </filter>
    </defs>
    
    <!-- B Icon (Monochrome - Dark on Light) -->
    <g id="bIconMono" transform="translate(30, 30)">
        <!-- B shape - dark color for light backgrounds -->
        <path d="M 30 20 L 30 120 L 65 120 Q 85 120 85 100 Q 85 85 70 85 L 30 85 M 30 70 L 60 70 Q 80 70 80 55 Q 80 40 60 40 L 30 40" 
              fill="#0D1117" stroke="none" stroke-width="2"/>
        
        <!-- Circuit traces - single color -->
        <g stroke="#0D1117" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main circuit line -->
            <path d="M 90 35 L 110 35 L 110 50 L 95 50 M 110 50 L 130 50 L 130 70"/>
            
            <!-- Secondary circuit line -->
            <path d="M 90 85 L 115 85 L 115 100 L 90 100 M 115 85 L 135 85 L 135 105"/>
            
            <!-- Bottom circuit -->
            <path d="M 90 115 L 125 115 L 125 105"/>
        </g>
        
        <!-- Circuit nodes - dark dots -->
        <circle cx="110" cy="35" r="2.5" fill="#0D1117"/>
        <circle cx="110" cy="50" r="2" fill="#0D1117" opacity="0.8"/>
        <circle cx="130" cy="70" r="2.5" fill="#0D1117"/>
        <circle cx="115" cy="85" r="2" fill="#0D1117" opacity="0.8"/>
        <circle cx="135" cy="105" r="2.5" fill="#0D1117"/>
        <circle cx="125" cy="115" r="2" fill="#0D1117" opacity="0.8"/>
    </g>
    
    <!-- Wordmark - Monochrome Dark -->
    <g id="wordmarkMono" transform="translate(240, 55)">
        <!-- BLAZE in dark -->
        <text x="0" y="55" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="72" font-weight="700" letter-spacing="-2" fill="#0D1117">BLAZE</text>
        
        <!-- LOGIC in dark -->
        <text x="385" y="55" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="72" font-weight="700" letter-spacing="-1.5" fill="#0D1117">LOGIC</text>
    </g>
    
    <!-- Underline pulse - monochrome -->
    <line x1="240" y1="90" x2="700" y2="90" stroke="#0D1117" stroke-width="2" opacity="0.8"/>
    <ellipse cx="470" cy="90" rx="40" ry="3" fill="none" stroke="#0D1117" stroke-width="1" opacity="0.4"/>
</svg>